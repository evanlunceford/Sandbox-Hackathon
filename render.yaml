services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: mr-cassette-api
    runtime: python
    region: oregon
    plan: free
    rootDir: src/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: mr-cassette-frontend
    runtime: static
    plan: free
    rootDir: src/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
